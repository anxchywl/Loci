services:
  web:
    networks:
      - wished-proxy

  api:
    environment:
      WEB_CONCURRENCY: "2"
      DB_POOL_SIZE: "5"
      DB_MAX_OVERFLOW: "3"
    mem_limit: 512m
    networks:
      - wished-proxy

  worker:
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=1 -Q images
    mem_limit: 512m

  worker-events:
    mem_limit: 192m

  postgres:
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - max_connections=50
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=2GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - work_mem=4MB
      - -c
      - random_page_cost=1.1
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=1GB
      - -c
      - wal_compression=on
    mem_limit: 1g

  redis:
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - noeviction
    mem_limit: 256m

networks:
  wished-proxy:
    external: true
    name: wished_wished-app
