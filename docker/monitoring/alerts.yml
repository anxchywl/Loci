groups:
  - name: loci-api
    rules:
      - alert: LociApiHighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) / clamp_min(sum(rate(http_requests_total[5m])), 0.001) > 0.02
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Loci API 5xx rate exceeds 2 percent
      - alert: LociApiHighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Loci API p95 latency exceeds 500 ms
      - alert: LociDatabasePoolSaturation
        expr: db_pool_connections_checked_out / clamp_min(db_pool_connection_capacity, 1) > 0.8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Loci database pool utilization exceeds 80 percent
      - alert: LociRedisHighP95Latency
        expr: histogram_quantile(0.95, sum by (le) (rate(redis_command_duration_seconds_bucket[5m]))) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Loci Redis p95 latency exceeds 50 ms
      - alert: LociMetricsTargetDown
        expr: up{job=~"loci-api|node-exporter|cadvisor"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Prometheus cannot scrape a Loci metrics target
      - alert: LociImageQueueBacklog
        expr: celery_queue_depth{queue="images"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Loci image queue exceeds 100 pending tasks
      - alert: LociBackupStale
        expr: loci_backup_age_seconds < 0 or loci_backup_age_seconds > 93600
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: Loci database backup is missing or older than 26 hours
      - alert: LociHostMemoryPressure
        expr: 1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes > 0.9
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Loci host memory utilization exceeds 90 percent
